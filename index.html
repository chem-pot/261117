<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화학 결합 시뮬레이션</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', sans-serif;
    background: linear-gradient(135deg, #0d0d1a, #0a1020, #071a30);
    min-height: 100vh;
    color: #ccc;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin-bottom: 18px;
    color: #0099bb;
    text-shadow: 0 0 10px #0099bb66;
    letter-spacing: 2px;
  }

  .bond-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 18px;
  }
  .bond-btn {
    padding: 12px 36px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .ionic-btn {
    background: linear-gradient(135deg, #a83232, #7a1a1a);
    color: #eee;
    box-shadow: 0 4px 14px #7a1a1a55;
  }
  .ionic-btn:hover, .ionic-btn.active {
    transform: scale(1.07);
    box-shadow: 0 6px 22px #a8323288;
  }
  .covalent-btn {
    background: linear-gradient(135deg, #1a6688, #0d3d55);
    color: #eee;
    box-shadow: 0 4px 14px #0d3d5555;
  }
  .covalent-btn:hover, .covalent-btn.active {
    transform: scale(1.07);
    box-shadow: 0 6px 22px #1a668888;
  }

  .guide-banner {
    text-align: center;
    font-size: 0.95rem;
    margin-bottom: 12px;
    min-height: 28px;
    color: #c9a800;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  .periodic-table-wrap {
    background: rgba(255,255,255,0.03);
    border-radius: 16px;
    padding: 16px 10px;
    border: 1px solid rgba(255,255,255,0.07);
    overflow-x: auto;
    margin-bottom: 16px;
  }
  .periodic-table {
    display: grid;
    grid-template-columns: repeat(18, 1fr);
    gap: 3px;
    min-width: 900px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .element-card {
    aspect-ratio: 1 / 1.15;
    border-radius: 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.18s;
    border: 2px solid transparent;
    position: relative;
    user-select: none;
    padding: 2px 0;
  }
  .element-card:hover {
    transform: scale(1.18);
    z-index: 10;
    border-color: #aaa;
    box-shadow: 0 0 10px #aaaaaa55;
  }
  .element-card.selected {
    border-color: #c9a800 !important;
    box-shadow: 0 0 14px #c9a80088 !important;
    transform: scale(1.13);
    z-index: 5;
  }
  .element-card.disabled {
    opacity: 0.18;
    cursor: not-allowed;
    pointer-events: none;
  }
  .element-card .el-num {
    font-size: 0.5rem;
    opacity: 0.7;
    line-height: 1;
  }
  .element-card .el-sym {
    font-size: 0.95rem;
    font-weight: bold;
    line-height: 1.1;
  }
  .element-card .el-name {
    font-size: 0.42rem;
    opacity: 0.8;
    line-height: 1;
  }
  .empty-cell {
    visibility: hidden;
  }

  /* 원소 종류별 색 - 전체적으로 어둡게 */
  .metal     { background: linear-gradient(135deg, #7a2a1a, #5a1a10); color: #ddd; }
  .nonmetal  { background: linear-gradient(135deg, #1a5c3a, #0f3d26); color: #ddd; }
  .noble     { background: linear-gradient(135deg, #2a2a3a, #1a1a28); color: #aaa; }
  .metalloid { background: linear-gradient(135deg, #7a5a10, #554008); color: #ddd; }

  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.82rem;
    color: #bbb;
  }
  .legend-box {
    width: 16px; height: 16px; border-radius: 3px;
  }
  .lb-metal     { background: linear-gradient(135deg, #7a2a1a, #5a1a10); }
  .lb-nonmetal  { background: linear-gradient(135deg, #1a5c3a, #0f3d26); }
  .lb-noble     { background: linear-gradient(135deg, #2a2a3a, #1a1a28); border: 1px solid #444; }
  .lb-metalloid { background: linear-gradient(135deg, #7a5a10, #554008); }

  .cancel-area {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }
  .cancel-btn {
    padding: 8px 28px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.2);
    color: #bbb;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .cancel-btn:hover {
    background: rgba(160,50,50,0.3);
    border-color: #a83232;
    color: #eee;
  }

  .result-area {
    background: rgba(255,255,255,0.04);
    border-radius: 18px;
    padding: 28px 20px;
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    max-width: 800px;
    margin: 0 auto;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .result-area h2 {
    font-size: 1.1rem;
    color: #0099bb;
    margin-bottom: 18px;
    letter-spacing: 1px;
  }
  canvas#bondCanvas {
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    display: block;
    margin: 0 auto 14px;
  }
  .formula-label {
    font-size: 1.4rem;
    font-weight: bold;
    color: #c9a800;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .name-label {
    font-size: 1rem;
    color: #999;
    letter-spacing: 1px;
  }
  .placeholder-txt {
    color: rgba(255,255,255,0.18);
    font-size: 0.95rem;
  }

  .period-gap {
    grid-column: 1 / -1;
    height: 6px;
  }
</style>
</head>
<body>

<h1>⚗️ 화학 결합 시뮬레이션</h1>

<div class="bond-buttons">
  <button class="bond-btn ionic-btn"   id="ionicBtn"    onclick="startMode('ionic')">🔴 이온 결합</button>
  <button class="bond-btn covalent-btn" id="covalentBtn" onclick="startMode('covalent')">🔵 공유 결합</button>
</div>

<div class="guide-banner" id="guideBanner">결합 종류를 선택하세요.</div>

<div class="cancel-area" id="cancelArea" style="display:none;">
  <button class="cancel-btn" onclick="cancelMode()">✕ 취소</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-box lb-metal"></div><span>금속 원소</span></div>
  <div class="legend-item"><div class="legend-box lb-nonmetal"></div><span>비금속 원소</span></div>
  <div class="legend-item"><div class="legend-box lb-metalloid"></div><span>준금속 원소</span></div>
  <div class="legend-item"><div class="legend-box lb-noble"></div><span>비활성 기체</span></div>
</div>

<div class="periodic-table-wrap">
  <div class="periodic-table" id="periodicTable"></div>
</div>

<div class="result-area" id="resultArea">
  <p class="placeholder-txt">원소를 선택하면 결합 모형이 표시됩니다.</p>
</div>

  {num:112,sym:'Cn', name:'코페르니슘',type:'metal',     row:7, col:12, charge:2,  valence:2},
  {num:113,sym:'Nh', name:'니호늄',    type:'metal',     row:7, col:13, charge:3,  valence:3},
  {num:114,sym:'Fl', name:'플레로븀',  type:'metal',     row:7, col:14, charge:2,  valence:2},
  {num:115,sym:'Mc', name:'모스코븀',  type:'metal',     row:7, col:15, charge:3,  valence:3},
  {num:116,sym:'Lv', name:'리버모륨',  type:'metal',     row:7, col:16, charge:2,  valence:2},
  {num:117,sym:'Ts', name:'테네신',    type:'metalloid', row:7, col:17, charge:null,valence:1},
  {num:118,sym:'Og', name:'오가네손',  type:'noble',     row:7, col:18, charge:null,valence:0},
];

/* ── 상태 ── */
let mode = null;
let selected = [];

/* ══════════════════════════════════════════════
   주기율표 렌더링
══════════════════════════════════════════════ */
function renderTable() {
  const table = document.getElementById('periodicTable');
  table.innerHTML = '';
  const grid = Array.from({length:9}, () => Array(18).fill(null));
  ALL_ELEMENTS.forEach(el => { grid[el.row-1][el.col-1] = el; });

  for (let r = 0; r < 9; r++) {
    if (r === 7) {
      const gap = document.createElement('div');
      gap.className = 'period-gap';
      gap.style.gridColumn = '1 / -1';
      table.appendChild(gap);
    }
    for (let c = 0; c < 18; c++) {
      const el = grid[r][c];
      const div = document.createElement('div');
      if ((r === 7 || r === 8) && c < 3) {
        div.className = 'element-card empty-cell';
        div.innerHTML = '&nbsp;';
        table.appendChild(div);
        continue;
      }
      if (!el) {
        div.className = 'element-card empty-cell';
        div.innerHTML = '&nbsp;';
      } else {
        div.className = `element-card ${el.type}`;
        div.id = `el_${el.num}`;
        div.innerHTML = `
          <span class="el-num">${el.num}</span>
          <span class="el-sym">${el.sym}</span>
          <span class="el-name">${el.name}</span>`;
        div.addEventListener('click', () => selectElement(el));
        div.title = `${el.name} (${el.sym}) | 원자번호 ${el.num}`;
      }
      table.appendChild(div);
    }
  }
}

/* ── 모드 시작 ── */
function startMode(m) {
  mode = m;
  selected = [];
  updateGuide();
  document.getElementById('cancelArea').style.display = 'flex';
  document.getElementById('ionicBtn').classList.toggle('active', m === 'ionic');
  document.getElementById('covalentBtn').classList.toggle('active', m === 'covalent');
  applyDisabled();
  clearResult();
}

/* ── 취소 ── */
function cancelMode() {
  selected.forEach(el => {
    const div = document.getElementById(`el_${el.num}`);
    if (div) div.classList.remove('selected');
  });
  mode = null;
  selected = [];
  document.getElementById('cancelArea').style.display = 'none';
  document.getElementById('ionicBtn').classList.remove('active');
  document.getElementById('covalentBtn').classList.remove('active');
  updateGuide();
  applyDisabled();
  clearResult();
}

/* ── 원소 선택 ── */
function selectElement(el) {
  if (!mode) return;
  const div = document.getElementById(`el_${el.num}`);
  const idx = selected.findIndex(e => e.num === el.num);
  if (idx !== -1) {
    selected.splice(idx, 1);
    div.classList.remove('selected');
    applyDisabled();
    updateGuide();
    return;
  }
  if (selected.length >= 2) return;

  if (mode === 'ionic') {
    if (selected.length === 0) {
      if (el.type !== 'metal') { alert('이온 결합: 첫 번째 원소는 금속 원소를 선택하세요.'); return; }
    } else {
      if (el.type !== 'nonmetal') { alert('이온 결합: 두 번째 원소는 비금속 원소를 선택하세요.'); return; }
    }
  } else {
    if (el.type !== 'nonmetal' && el.type !== 'metalloid') {
      alert('공유 결합: 비금속 또는 준금속 원소만 선택 가능합니다.'); return;
    }
    if (el.valence === 0) { alert('비활성 기체는 공유 결합을 하지 않습니다.'); return; }
  }

  selected.push(el);
  div.classList.add('selected');
  applyDisabled();
  updateGuide();
  if (selected.length === 2) setTimeout(() => showResult(), 250);
}

/* ── 안내 배너 ── */
function updateGuide() {
  const b = document.getElementById('guideBanner');
  if (!mode) { b.textContent = '결합 종류를 선택하세요.'; return; }
  if (mode === 'ionic') {
    b.textContent = selected.length === 0
      ? '🔴 이온 결합 | ① 금속 원소를 선택하세요.'
      : `🔴 이온 결합 | ② 비금속 원소를 선택하세요.  (선택됨: ${selected[0].name} ${selected[0].sym})`;
  } else {
    b.textContent = selected.length === 0
      ? '🔵 공유 결합 | ① 비금속 원소를 선택하세요.'
      : `🔵 공유 결합 | ② 두 번째 비금속 원소를 선택하세요.  (선택됨: ${selected[0].name} ${selected[0].sym})`;
  }
}

/* ── disabled 처리 ── */
function applyDisabled() {
  ALL_ELEMENTS.forEach(el => {
    const div = document.getElementById(`el_${el.num}`);
    if (!div) return;
    div.classList.remove('disabled');
    if (!mode) return;
    if (selected.find(s => s.num === el.num)) return;
    if (mode === 'ionic') {
      if (selected.length === 0) { if (el.type !== 'metal') div.classList.add('disabled'); }
      else                       { if (el.type !== 'nonmetal') div.classList.add('disabled'); }
    } else {
      if ((el.type !== 'nonmetal' && el.type !== 'metalloid') || el.valence === 0)
        div.classList.add('disabled');
    }
  });
}

/* ══════════════════════════════════════════════
   결과 표시
══════════════════════════════════════════════ */
function clearResult() {
  document.getElementById('resultArea').innerHTML =
    '<p class="placeholder-txt">원소를 선택하면 결합 모형이 표시됩니다.</p>';
}

function showResult() {
  const [a, b] = selected;
  if (mode === 'ionic') {
    const {formula, compoundName, mCount, nCount} = getIonicInfo(a, b);
    drawIonic(a, b, formula, compoundName, mCount, nCount);
  } else {
    const {formula, compoundName} = getCovalentInfo(a, b);
    drawCovalent(a, b, formula, compoundName);
  }
}

/* ── 이온 결합 정보 ── */
function getIonicInfo(metal, nonmetal) {
  const mc = Math.abs(metal.charge ?? 1);
  const nc = Math.abs(nonmetal.charge ?? 1);
  const g  = gcd(mc, nc);
  const mCount = nc / g, nCount = mc / g;
  let formula = metal.sym + (mCount > 1 ? `<sub>${mCount}</sub>` : '')
              + nonmetal.sym + (nCount > 1 ? `<sub>${nCount}</sub>` : '');
  return {formula, compoundName: `${metal.name} ${getNonmetalSuffix(nonmetal.sym)}`, mCount, nCount};
}
function getNonmetalSuffix(sym) {
  const m = {F:'플루오린화물',Cl:'염화물',Br:'브로민화물',I:'아이오딘화물',
             O:'산화물',S:'황화물',N:'질화물',H:'수소화물',Se:'셀레늄화물'};
  return m[sym] || '화합물';
}

/* ── 공유 결합 정보 ── */
function getCovalentInfo(a, b) {
  const key = [a.sym, b.sym].sort().join('-');
  const known = {
    'H-H'  :{f:'H<sub>2</sub>',              n:'수소'},
    'H-O'  :{f:'H<sub>2</sub>O',             n:'물'},
    'H-N'  :{f:'NH<sub>3</sub>',             n:'암모니아'},
    'C-H'  :{f:'CH<sub>4</sub>',             n:'메테인'},
    'C-O'  :{f:'CO<sub>2</sub>',             n:'이산화 탄소'},
    'Cl-Cl':{f:'Cl<sub>2</sub>',             n:'염소'},
    'H-Cl' :{f:'HCl',                        n:'염화 수소'},
    'F-F'  :{f:'F<sub>2</sub>',              n:'플루오린'},
    'H-F'  :{f:'HF',                         n:'플루오린화 수소'},
    'Br-Br':{f:'Br<sub>2</sub>',             n:'브로민'},
    'H-Br' :{f:'HBr',                        n:'브로민화 수소'},
    'I-I'  :{f:'I<sub>2</sub>',              n:'아이오딘'},
    'H-I'  :{f:'HI',                         n:'아이오딘화 수소'},
    'N-N'  :{f:'N<sub>2</sub>',              n:'질소'},
    'O-O'  :{f:'O<sub>2</sub>',              n:'산소'},
    'H-S'  :{f:'H<sub>2</sub>S',             n:'황화 수소'},
    'N-O'  :{f:'NO',                         n:'일산화 질소'},
    'H-Se' :{f:'H<sub>2</sub>Se',            n:'셀레늄화 수소'},
    'C-C'  :{f:'C<sub>2</sub>H<sub>6</sub>', n:'에테인(참고)'},
    'C-N'  :{f:'HCN',                        n:'사이안화 수소'},
    'Cl-F' :{f:'ClF',                        n:'염소 플루오린화물'},
    'Br-Cl':{f:'BrCl',                       n:'브로민화 염소'},
    'Si-H' :{f:'SiH<sub>4</sub>',            n:'실레인'},
    'P-H'  :{f:'PH<sub>3</sub>',             n:'포스핀'},
  };
  if (known[key]) return {formula: known[key].f, compoundName: known[key].n};
  const va = a.valence, vb = b.valence;
  const g  = gcd(va||1, vb||1);
  const cA = (vb||1)/g, cB = (va||1)/g;
  return {
    formula: (cA===1?a.sym:`${a.sym}<sub>${cA}</sub>`) + (cB===1?b.sym:`${b.sym}<sub>${cB}</sub>`),
    compoundName: `${a.name}-${b.name} 화합물`
  };
}

function gcd(a,b){ return b===0?a:gcd(b,a%b); }

/* ══════════════════════════════════════════════
   캔버스 공통 세팅
══════════════════════════════════════════════ */
function setupCanvas(w, h, titleText) {
  const ra = document.getElementById('resultArea');
  ra.innerHTML = '';
  const t = document.createElement('h2');
  t.textContent = titleText;
  ra.appendChild(t);
  const cvs = document.createElement('canvas');
  cvs.id = 'bondCanvas'; cvs.width = w; cvs.height = h;
  cvs.style.maxWidth = '100%';
  ra.appendChild(cvs);
  const fd = document.createElement('div');
  fd.className = 'formula-label'; fd.id = 'formulaLabel';
  ra.appendChild(fd);
  const nd = document.createElement('div');
  nd.className = 'name-label'; nd.id = 'nameLabel';
  ra.appendChild(nd);
  return cvs.getContext('2d');
}

/* ══════════════════════════════════════════════
   이온 결합 그리기
══════════════════════════════════════════════ */
function drawIonic(metal, nonmetal, formula, compoundName, mCount, nCount) {
  const total = mCount + nCount;
  const W = Math.max(640, total * 110 + 140), H = 290;
  const ctx = setupCanvas(W, H, '🔴 이온 결합 모형');
  ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(0,0,W,H);

  const cx = W/2, cy = H/2 - 15, sp = 100;
  const startX = cx - ((total-1)*sp)/2;

  if (mCount===1 && nCount===1)
    drawElectronArrow(ctx, startX, cy, startX+sp, cy, Math.abs(metal.charge??1));

  for (let i=0; i<mCount; i++)
    drawIonCircle(ctx, startX+i*sp, cy, 34, metal, true, Math.abs(metal.charge??1));
  for (let j=0; j<nCount; j++)
    drawIonCircle(ctx, startX+(mCount+j)*sp, cy, 34, nonmetal, false, Math.abs(nonmetal.charge??1));

  document.getElementById('formulaLabel').innerHTML = '화학식: ' + formula;
  document.getElementById('nameLabel').textContent  = '이름: '   + compoundName;
}

function drawIonCircle(ctx, x, y, r, el, isCation, chargeAbs) {
  // 글로우
  const grd = ctx.createRadialGradient(x,y,r*0.3,x,y,r*1.8);
  grd.addColorStop(0, isCation?'rgba(160,60,30,0.35)':'rgba(20,120,80,0.35)');
  grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(x,y,r*1.8,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();

  // 원 본체 (어둡게)
  const grad = ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  if (isCation) { grad.addColorStop(0,'#8b3a20'); grad.addColorStop(1,'#4a1508'); }
  else          { grad.addColorStop(0,'#1a6644'); grad.addColorStop(1,'#0a3322'); }
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5; ctx.stroke();

  // 심볼
  ctx.fillStyle='#ddd'; ctx.font=`bold ${Math.round(r*0.6)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(el.sym,x,y);

  // 이온 전하
  const sign  = isCation?'+':'−';
  const label = chargeAbs===1?sign:`${chargeAbs}${sign}`;
  ctx.font='bold 13px Arial';
  ctx.fillStyle = isCation?'#c9a800':'#4a90b8';
  ctx.fillText(label, x+r*0.8, y-r*0.8);

  // 이름
  ctx.font='11px Arial'; ctx.fillStyle='rgba(200,200,200,0.7)';
  ctx.fillText(el.name, x, y+r+15);
  ctx.fillStyle = isCation?'#c9a800':'#4a90b8';
  ctx.fillText(isCation?'양이온':'음이온', x, y+r+29);
}

function drawElectronArrow(ctx, x1, y, x2, _y, count) {
  const midX=(x1+x2)/2, ctrlY=y-68;
  ctx.strokeStyle='#a08800'; ctx.lineWidth=1.5; ctx.setLineDash([5,3]);
  ctx.beginPath();
  ctx.moveTo(x1+22, y-38);
  ctx.quadraticCurveTo(midX, ctrlY, x2-22, y-38);
  ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#a08800';
  ctx.beginPath(); ctx.moveTo(x2-20,y-40); ctx.lineTo(x2-30,y-32); ctx.lineTo(x2-28,y-46); ctx.fill();
  ctx.font='bold 12px Arial'; ctx.fillStyle='#a08800'; ctx.textAlign='center';
  ctx.fillText(`e⁻ × ${count}`, midX, ctrlY-12);
}

/* ══════════════════════════════════════════════
   공유 결합 그리기
══════════════════════════════════════════════ */
function drawCovalent(a, b, formula, compoundName) {
  const bondCount = getBondCount(a,b);
  const W=560, H=300;
  const ctx = setupCanvas(W, H, '🔵 공유 결합 모형');
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(0,0,W,H);

  const cx=W/2, cy=H/2-10, r=40, dist=130;
  const lx=cx-dist/2, rx=cx+dist/2;

  drawCovalentBonds(ctx, lx, cy, rx, cy, bondCount, r);
  drawLonePairs(ctx, lx, cy, r, a, bondCount, 'left');
  drawLonePairs(ctx, rx, cy, r, a.sym===b.sym?a:b, bondCount, 'right');
  drawAtomCircle(ctx, lx, cy, r, a,             '#0a4a6e','#1a6a9a');
  drawAtomCircle(ctx, rx, cy, r, a.sym===b.sym?a:b, '#3a1a6e','#5a3a9a');

  const bondName=['','단일','이중','삼중'][bondCount]||'';
  ctx.font='13px Arial'; ctx.fillStyle='rgba(180,180,180,0.45)'; ctx.textAlign='center';
  ctx.fillText(`${bondName} 결합 (공유 전자쌍 ${bondCount}쌍)`, cx, cy+68);

  document.getElementById('formulaLabel').innerHTML = '화학식: ' + formula;
  document.getElementById('nameLabel').textContent  = '이름: '   + compoundName;
}

function getBondCount(a,b) {
  const key=[a.sym,b.sym].sort().join('-');
  const m={
    'H-H':1,'H-O':1,'H-N':1,'C-H':1,'Cl-Cl':1,'F-F':1,'Br-Br':1,'I-I':1,
    'H-Cl':1,'H-F':1,'H-Br':1,'H-I':1,'H-S':1,'H-Se':1,'P-H':1,
    'C-O':2,'O-O':2,'N-O':2,'S-O':2,
    'N-N':3,'C-N':3,'C-C':1,
  };
  return m[key]??1;
}

function drawCovalentBonds(ctx, x1, y, x2, _y, n, r) {
  const gap=10;
  const offs=n===1?[0]:n===2?[-gap/2,gap/2]:[-gap,0,gap];
  offs.forEach(dy=>{
    const grd=ctx.createLinearGradient(x1,y,x2,y);
    grd.addColorStop(0,'#1a5a8a'); grd.addColorStop(0.5,'#8899aa'); grd.addColorStop(1,'#3a2a7a');
    ctx.beginPath();
    ctx.moveTo(x1+r*0.88, y+dy); ctx.lineTo(x2-r*0.88, y+dy);
    ctx.strokeStyle=grd; ctx.lineWidth=3.5; ctx.stroke();
  });
}

function drawLonePairs(ctx, x, y, r, el, bondCount, side) {
  const lonePairs=Math.floor((el.valence>0?(8-el.valence):0)/2);
  if(lonePairs<=0)return;
  const positions=side==='left'
    ?[{dx:-1.3,dy:0},{dx:0,dy:-1.3},{dx:0,dy:1.3}]
    :[{dx:1.3,dy:0},{dx:0,dy:-1.3},{dx:0,dy:1.3}];
  for(let i=0;i<Math.min(lonePairs,positions.length);i++){
    drawDotPair(ctx, x+positions[i].dx*(r+12), y+positions[i].dy*(r+12),
                positions[i].dx, positions[i].dy);
  }
}

function drawDotPair(ctx, cx, cy, dx, dy) {
  ctx.fillStyle='#a08800';
  const off=5;
  const dots=Math.abs(dx)>0.5
    ?[{x:cx,y:cy-off},{x:cx,y:cy+off}]
    :[{x:cx-off,y:cy},{x:cx+off,y:cy}];
  dots.forEach(d=>{ ctx.beginPath(); ctx.arc(d.x,d.y,3.5,0,Math.PI*2); ctx.fill(); });
}

function drawAtomCircle(ctx, x, y, r, el, c1, c2) {
  const grd=ctx.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
  grd.addColorStop(0,c2); grd.addColorStop(1,c1);
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=grd; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#ddd'; ctx.font=`bold ${Math.round(r*0.6)}px Arial`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(el.sym,x,y);
  ctx.font='12px Arial'; ctx.fillStyle='rgba(180,180,180,0.7)';
  ctx.fillText(el.name, x, y+r+16);
}

/* ── 초기화 ── */
renderTable();
</script>
